<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SocioÉlect Paris · Municipales 2026 · T1</title>
</head>
<body>

<header id="header">
  <div id="header-logo">🗳</div>
  <h1>SocioÉlect Paris</h1>
  <span class="sep">|</span>
  <span class="subtitle">Municipales 2026 · Premier tour · ~900 bureaux de vote</span>
  <div id="header-spacer"></div>
  <span id="header-badge">T1 · 2026</span>
</header>

<div id="main">
  <!-- Map -->
  <div id="map-panel">
    <div id="map"></div>

    <div id="layer-controls">
      <button id="mobile-layer-toggle" type="button">Afficher les couches</button>
      <div class="ctrl-label">Afficher</div>
      <div class="ctrl-group">
        <div class="group-title">Socio-éco</div>
        <button class="layer-btn active" data-layer="abstention">Taux d'abstention</button>
        <button class="layer-btn" data-layer="revenu">Revenu médian</button>
        <button class="layer-btn" data-layer="hlm">Densité HLM</button>
      </div>
      <div class="ctrl-group">
        <div class="group-title">Candidats</div>
        <button class="layer-btn" data-layer="gregoire" style="--party-color:#E91E8C"><span class="party-badge" style="background:#E91E8C">LUG</span>Grégoire</button>
        <button class="layer-btn" data-layer="dati"     style="--party-color:#1A5CB8"><span class="party-badge" style="background:#1A5CB8">LUD</span>Dati</button>
        <button class="layer-btn" data-layer="chikirou" style="--party-color:#CC0000"><span class="party-badge" style="background:#CC0000">LFI</span>Chikirou</button>
        <button class="layer-btn" data-layer="bournazel" style="--party-color:#E07B00"><span class="party-badge" style="background:#E07B00">LUC</span>Bournazel</button>
        <button class="layer-btn" data-layer="knafo"    style="--party-color:#1E5F8A"><span class="party-badge" style="background:#1E5F8A">LEXD</span>Knafo</button>
        <button class="layer-btn" data-layer="autres"   style="--party-color:#555e6d"><span class="party-badge" style="background:#555e6d">–</span>Autres</button>
      </div>
    </div>

    <div id="legend">
      <div id="legend-header">
        <span class="legend-title" id="legend-title">Abstention (%)</span>
        <span id="legend-party-badge"></span>
      </div>
      <div id="legend-bar"></div>
      <div id="legend-labels">
        <span id="leg-min">–</span>
        <span id="leg-mid">–</span>
        <span id="leg-max">–</span>
      </div>
    </div>

    <div id="tooltip"></div>
  </div>

  <!-- Chart -->
  <div id="chart-panel">
    <div id="chart-header">
      <div id="chart-header-top">
        <h2>Densité HLM × Taux d'abstention</h2>
        <button id="mobile-chart-toggle" type="button">Ouvrir le graphique</button>
      </div>
      <p>Chaque point = 1 bureau de vote · couleur = arrondissement</p>
      <div id="axis-controls">
        <div class="axis-control">
          <label for="x-axis-select">Axe X</label>
          <select id="x-axis-select"></select>
        </div>
        <div class="axis-control">
          <label for="y-axis-select">Axe Y</label>
          <select id="y-axis-select"></select>
        </div>
      </div>
    </div>
    <div id="scatter-container">
      <svg id="scatter"></svg>
    </div>
    <div id="stats-bar">
      <div class="stat-item"><span class="stat-label">r²</span><span class="stat-val" id="stat-r2">–</span></div>
      <div class="stat-item"><span class="stat-label">r Pearson</span><span class="stat-val" id="stat-r">–</span></div>
      <div class="stat-item"><span class="stat-label">n bureaux</span><span class="stat-val" id="stat-n">–</span></div>
    </div>
  </div>
</div>

<script type="module" src="./src/main.js"></script>
</body>
</html>
