<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Paris Vote Map · Municipales 2026 · T1</title>

  <!-- MapLibre GL JS -->
  <link href="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.css" rel="stylesheet">
  <script src="https://unpkg.com/maplibre-gl@3/dist/maplibre-gl.js"></script>

  <!-- D3.js v7 -->
  <script src="https://cdn.jsdelivr.net/npm/d3@7/dist/d3.min.js"></script>

  <style>
    /* ── Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #1a1a2e;
      color: #e8e8e8;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── Header ── */
    #header {
      height: 56px;
      background: #16213e;
      border-bottom: 1px solid #0f3460;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 16px;
      flex-shrink: 0;
      z-index: 10;
    }
    #header h1 {
      font-size: 15px;
      font-weight: 600;
      color: #e8e8e8;
      letter-spacing: 0.3px;
    }
    #header .subtitle {
      font-size: 12px;
      color: #8892b0;
    }
    #header .dot { color: #0f3460; }

    /* ── Main Layout ── */
    #main {
      flex: 1;
      display: flex;
      overflow: hidden;
    }

    /* ── Map Panel ── */
    #map-panel {
      flex: 0 0 60%;
      position: relative;
    }
    #map { width: 100%; height: 100%; }

    /* Layer Controls */
    #layer-controls {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(22, 33, 62, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 5;
    }
    #mobile-layer-toggle {
      display: none;
      width: 100%;
      background: transparent;
      border: 1px solid #0f3460;
      color: #4a90d9;
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      cursor: pointer;
      margin-bottom: 8px;
    }
    #layer-controls .ctrl-label {
      font-size: 11px;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    #layer-controls .ctrl-group {
      margin-bottom: 10px;
    }
    #layer-controls .ctrl-group:last-child {
      margin-bottom: 0;
    }
    #layer-controls .group-title {
      font-size: 10px;
      color: #4a90d9;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin: 0 0 6px;
    }
    .layer-btn {
      display: block;
      width: 100%;
      text-align: left;
      background: transparent;
      border: 1px solid #0f3460;
      color: #8892b0;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      margin-bottom: 4px;
      transition: all 0.15s;
    }
    .layer-btn:last-child { margin-bottom: 0; }
    .layer-btn.active {
      background: #0f3460;
      color: #e8e8e8;
      border-color: #4a90d9;
    }
    .layer-btn:hover:not(.active) { border-color: #4a90d9; color: #e8e8e8; }

    /* Legend */
    #legend {
      position: absolute;
      bottom: 28px;
      left: 12px;
      background: rgba(22, 33, 62, 0.92);
      backdrop-filter: blur(8px);
      border: 1px solid #0f3460;
      border-radius: 8px;
      padding: 10px 14px;
      z-index: 5;
      min-width: 180px;
    }
    #legend .legend-title {
      font-size: 11px;
      color: #8892b0;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }
    #legend-bar {
      display: flex;
      height: 10px;
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 4px;
    }
    #legend-bar div { flex: 1; }
    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: #8892b0;
    }

    /* Tooltip */
    #tooltip {
      position: absolute;
      pointer-events: none;
      background: rgba(22, 33, 62, 0.96);
      border: 1px solid #4a90d9;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 12px;
      line-height: 1.7;
      z-index: 100;
      max-width: 260px;
      display: none;
    }
    #tooltip strong { color: #4a90d9; font-size: 13px; }
    #tooltip .tip-warn {
      font-size: 10px;
      color: #8892b0;
      margin-top: 6px;
      border-top: 1px solid #0f3460;
      padding-top: 6px;
      line-height: 1.5;
    }

    /* ── Chart Panel ── */
    #chart-panel {
      flex: 0 0 40%;
      display: flex;
      flex-direction: column;
      border-left: 1px solid #0f3460;
      overflow: hidden;
    }
    #chart-header {
      padding: 14px 20px 10px;
      border-bottom: 1px solid #0f3460;
      flex-shrink: 0;
    }
    #chart-header-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }
    #chart-header h2 { font-size: 13px; font-weight: 600; color: #e8e8e8; }
    #chart-header p  { font-size: 11px; color: #8892b0; margin-top: 2px; }
    #mobile-chart-toggle {
      display: none;
      background: transparent;
      border: 1px solid #0f3460;
      color: #4a90d9;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 11px;
      cursor: pointer;
      flex-shrink: 0;
    }
    #axis-controls {
      margin-top: 10px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    .axis-control {
      display: flex;
      flex-direction: column;
      gap: 4px;
      min-width: 140px;
    }
    .axis-control label {
      font-size: 10px;
      color: #4a90d9;
      text-transform: uppercase;
      letter-spacing: 0.8px;
    }
    .axis-control select {
      background: rgba(15, 52, 96, 0.45);
      border: 1px solid #0f3460;
      color: #e8e8e8;
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
    }
    #scatter-container {
      flex: 1;
      padding: 10px 20px 20px;
      overflow: hidden;
    }
    #scatter { width: 100%; height: 100%; }

    /* Stats bar below scatter */
    #stats-bar {
      padding: 8px 20px 14px;
      display: flex;
      gap: 20px;
      flex-shrink: 0;
      border-top: 1px solid #0f3460;
    }
    .stat-item { font-size: 11px; color: #8892b0; }
    .stat-item span { color: #4a90d9; font-weight: 600; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      #main { flex-direction: column; }
      body { overflow: auto; }
      #header {
        height: auto;
        min-height: 56px;
        padding: 10px 14px;
        gap: 8px;
        flex-wrap: wrap;
        align-items: flex-start;
      }
      #header .dot { display: none; }
      #header h1 {
        width: 100%;
        font-size: 14px;
      }
      #header .subtitle {
        width: 100%;
        font-size: 11px;
        line-height: 1.4;
      }
      #main {
        overflow: visible;
      }
      #map-panel {
        flex: 0 0 52vh;
        min-height: 420px;
      }
      #map {
        min-height: 420px;
      }
      #layer-controls {
        top: 8px;
        left: 8px;
        right: auto;
        width: min(220px, calc(100vw - 16px));
        padding: 8px 10px;
        max-height: 46vh;
        overflow: auto;
      }
      #mobile-layer-toggle {
        display: block;
      }
      body.mobile-layers-collapsed #layer-controls {
        width: auto;
        max-width: calc(100vw - 16px);
      }
      body.mobile-layers-collapsed #layer-controls .ctrl-label,
      body.mobile-layers-collapsed #layer-controls .ctrl-group {
        display: none;
      }
      body.mobile-layers-collapsed #mobile-layer-toggle {
        margin-bottom: 0;
      }
      .layer-btn {
        font-size: 11px;
        padding: 6px 8px;
      }
      #legend {
        left: 8px;
        right: 8px;
        bottom: 8px;
        min-width: 0;
        width: auto;
        padding: 8px 10px;
      }
      #legend .legend-title {
        font-size: 10px;
        margin-bottom: 6px;
      }
      #legend-labels {
        font-size: 9px;
      }
      #tooltip {
        max-width: min(260px, calc(100vw - 24px));
        font-size: 11px;
      }
      #chart-panel { flex: 0 0 auto; border-left: none; border-top: 1px solid #0f3460; }
      #chart-header {
        padding: 12px 14px 10px;
      }
      #chart-header-top {
        align-items: flex-start;
      }
      #chart-header h2 {
        font-size: 12px;
        line-height: 1.4;
      }
      #chart-header p {
        font-size: 10px;
        line-height: 1.4;
      }
      #mobile-chart-toggle { display: inline-flex; align-items: center; }
      #axis-controls {
        flex-direction: column;
        gap: 8px;
      }
      .axis-control {
        min-width: 0;
        width: 100%;
      }
      .axis-control select {
        width: 100%;
      }
      #scatter-container {
        min-height: 260px;
        padding: 8px 14px 14px;
      }
      #stats-bar {
        padding: 8px 14px 12px;
        gap: 12px;
        flex-wrap: wrap;
      }
      .stat-item {
        font-size: 10px;
      }
      body.mobile-chart-collapsed #chart-panel { max-height: 70px; }
      body.mobile-chart-collapsed #scatter-container,
      body.mobile-chart-collapsed #stats-bar,
      body.mobile-chart-collapsed #axis-controls,
      body.mobile-chart-collapsed #chart-header p {
        display: none;
      }
      body.mobile-chart-collapsed #chart-header {
        border-bottom: none;
        padding-bottom: 14px;
      }
    }

    @media (max-width: 420px) {
      #map-panel {
        min-height: 380px;
      }
      #map {
        min-height: 380px;
      }
      #layer-controls {
        max-height: 42vh;
      }
      #chart-header-top {
        flex-direction: column;
      }
      #mobile-chart-toggle {
        width: 100%;
        justify-content: center;
      }
      #stats-bar {
        flex-direction: column;
        gap: 6px;
      }
    }

    /* MapLibre attribution */
    .maplibregl-ctrl-attrib { font-size: 9px !important; }
  </style>
</head>
<body>

<header id="header">
  <h1>Paris Vote Map</h1>
  <span class="dot">·</span>
  <span class="subtitle">Élections municipales 2026 · Premier tour · ~900 bureaux de vote</span>
</header>

<div id="main">
  <!-- Map -->
  <div id="map-panel">
    <div id="map"></div>

    <div id="layer-controls">
      <button id="mobile-layer-toggle" type="button">Afficher les couches</button>
      <div class="ctrl-label">Afficher</div>
      <div class="ctrl-group">
        <div class="group-title">Socio-éco</div>
        <button class="layer-btn active" data-layer="abstention">Taux d'abstention</button>
        <button class="layer-btn" data-layer="revenu">Revenu médian</button>
        <button class="layer-btn" data-layer="hlm">Densité HLM</button>
      </div>
      <div class="ctrl-group">
        <div class="group-title">Candidats</div>
        <button class="layer-btn" data-layer="gregoire">Grégoire</button>
        <button class="layer-btn" data-layer="dati">Dati</button>
        <button class="layer-btn" data-layer="chikirou">Chikirou</button>
        <button class="layer-btn" data-layer="bournazel">Bournazel</button>
        <button class="layer-btn" data-layer="knafo">Knafo</button>
        <button class="layer-btn" data-layer="autres">Autres</button>
      </div>
    </div>

    <div id="legend">
      <div class="legend-title" id="legend-title">Abstention (%)</div>
      <div id="legend-bar"></div>
      <div id="legend-labels">
        <span id="leg-min">–</span>
        <span id="leg-mid">–</span>
        <span id="leg-max">–</span>
      </div>
    </div>

    <div id="tooltip"></div>
  </div>

  <!-- Chart -->
  <div id="chart-panel">
    <div id="chart-header">
      <div id="chart-header-top">
        <h2>Densité HLM × Taux d'abstention</h2>
        <button id="mobile-chart-toggle" type="button">Ouvrir le graphique</button>
      </div>
      <p>Chaque point = 1 bureau de vote · couleur = arrondissement</p>
      <div id="axis-controls">
        <div class="axis-control">
          <label for="x-axis-select">Axe X</label>
          <select id="x-axis-select"></select>
        </div>
        <div class="axis-control">
          <label for="y-axis-select">Axe Y</label>
          <select id="y-axis-select"></select>
        </div>
      </div>
    </div>
    <div id="scatter-container">
      <svg id="scatter"></svg>
    </div>
    <div id="stats-bar">
      <div class="stat-item">r² = <span id="stat-r2">–</span></div>
      <div class="stat-item">r (Pearson) = <span id="stat-r">–</span></div>
      <div class="stat-item">n = <span id="stat-n">–</span></div>
    </div>
  </div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// CONFIG — Modifie les breakpoints après avoir lancé process.py
// (les valeurs Q1-Q4 sont imprimées à la fin du script Python)
// ═══════════════════════════════════════════════════════════
const BREAKS = {
  abstention: { Q1: 35.8,  Q2: 37.9,  Q3: 40.8,  Q4: 45.6  },
  revenu:     { Q1: 24518, Q2: 29806, Q3: 33826, Q4: 38578  },
  hlm:        { Q1: 297.5, Q2: 1256,  Q3: 2734,  Q4: 6145   },
  gregoire:   { Q1: 26.5,  Q2: 37.4,  Q3: 43.3,  Q4: 48.6   },
  dati:       { Q1: 15.4,  Q2: 19.2,  Q3: 24.6,  Q4: 35.6   },
  chikirou:   { Q1: 5.9,   Q2: 9.3,   Q3: 12.9,  Q4: 17.6   },
  bournazel:  { Q1: 7.4,   Q2: 10.1,  Q3: 12.4,  Q4: 14.7   },
  knafo:      { Q1: 6.7,   Q2: 8.3,   Q3: 10.2,  Q4: 13.7   },
  autres:     { Q1: 1.1,   Q2: 1.4,   Q3: 1.8,   Q4: 2.4    }
};

const COLORS = {
  abstention: ['#ffffb2','#fecc5c','#fd8d3c','#f03b20','#bd0026'],
  revenu:     ['#edf8fb','#b3cde3','#8c96c6','#8856a7','#810f7c'],
  hlm:        ['#ffffcc','#c2e699','#78c679','#31a354','#006837'],
  gregoire:   ['#fde0dd','#fcbba1','#fc9272','#fb6a4a','#cb181d'],
  dati:       ['#eff3ff','#bdd7e7','#6baed6','#3182bd','#08519c'],
  chikirou:   ['#edf8e9','#bae4b3','#74c476','#31a354','#006d2c'],
  bournazel:  ['#fff5eb','#fdd0a2','#fdae6b','#f16913','#a63603'],
  knafo:      ['#f2f0f7','#cbc9e2','#9e9ac8','#756bb1','#54278f'],
  autres:     ['#f7f7f7','#d9d9d9','#bdbdbd','#969696','#525252']
};

const LAYER_META = {
  abstention: { field: 'taux_abstention', label: 'Abstention (%)',        shortLabel: 'Taux d\'abstention', unit: '%',       decimals: 1 },
  revenu:     { field: 'revenu_median',   label: 'Revenu médian (€/UC)',  shortLabel: 'Revenu médian',      unit: '€',       decimals: 0 },
  hlm:        { field: 'hlm_density',     label: 'Densité HLM (log/km²)', shortLabel: 'Densité HLM',        unit: ' /km²',   decimals: 0 },
  gregoire:   { field: 'pct_gregoire',    label: 'Score Grégoire (%)',    shortLabel: 'Grégoire',           unit: '%',       decimals: 1 },
  dati:       { field: 'pct_dati',        label: 'Score Dati (%)',        shortLabel: 'Dati',               unit: '%',       decimals: 1 },
  chikirou:   { field: 'pct_chikirou',    label: 'Score Chikirou (%)',    shortLabel: 'Chikirou',           unit: '%',       decimals: 1 },
  bournazel:  { field: 'pct_bournazel',   label: 'Score Bournazel (%)',   shortLabel: 'Bournazel',          unit: '%',       decimals: 1 },
  knafo:      { field: 'pct_knafo',       label: 'Score Knafo (%)',       shortLabel: 'Knafo',              unit: '%',       decimals: 1 },
  autres:     { field: 'pct_autres',      label: 'Autres listes (%)',     shortLabel: 'Autres listes',      unit: '%',       decimals: 1 }
};

// Ce chemin est résolu depuis le document root `web/`.
const GEOJSON_PATH = 'data/processed/paris_2026_t1.geojson';

// ═══════════════════════════════════════════════════════════
// State
// ═══════════════════════════════════════════════════════════
let currentLayer = 'abstention';
let hoveredBvId  = null;
let geojsonData  = null;
let scatterCircles = null;
let scatterXLayer = 'hlm';
let scatterYLayer = 'abstention';
let mobileChartCollapsed = false;
let mobileLayersCollapsed = false;

populateAxisSelectors();
updateScatterHeader();
document.getElementById('mobile-layer-toggle').addEventListener('click', () => {
  if (!isMobileLayout()) return;
  mobileLayersCollapsed = !mobileLayersCollapsed;
  applyMobileLayerState();
});
document.getElementById('mobile-chart-toggle').addEventListener('click', () => {
  if (!isMobileLayout()) return;
  mobileChartCollapsed = !mobileChartCollapsed;
  applyMobileChartState();
});
syncMobileLayout();

// ═══════════════════════════════════════════════════════════
// MAP
// ═══════════════════════════════════════════════════════════
const map = new maplibregl.Map({
  container: 'map',
  style: 'https://basemaps.cartocdn.com/gl/dark-matter-gl-style/style.json',
  center: [2.3522, 48.8566],
  zoom: 11.2,
  minZoom: 10,
  maxZoom: 16
});

map.addControl(new maplibregl.NavigationControl(), 'bottom-right');

function buildColorExpr(layer) {
  const { field } = LAYER_META[layer];
  const colors    = COLORS[layer];
  const { Q1, Q2, Q3, Q4 } = BREAKS[layer];
  return [
    'case',
    ['==', ['get', field], null], '#555555',
    ['step', ['get', field],
      colors[0], Q1, colors[1], Q2, colors[2], Q3, colors[3], Q4, colors[4]
    ]
  ];
}

function updateLegend(layer) {
  const meta   = LAYER_META[layer];
  const colors = COLORS[layer];
  const b      = BREAKS[layer];

  document.getElementById('legend-title').textContent = meta.label;

  const bar = document.getElementById('legend-bar');
  bar.innerHTML = '';
  colors.forEach(c => {
    const d = document.createElement('div');
    d.style.background = c;
    bar.appendChild(d);
  });

  const fmt = v => meta.decimals === 0
    ? Math.round(v).toLocaleString('fr-FR')
    : v.toFixed(meta.decimals);

  document.getElementById('leg-min').textContent = '< ' + fmt(b.Q1) + meta.unit;
  document.getElementById('leg-mid').textContent = fmt(b.Q2) + meta.unit;
  document.getElementById('leg-max').textContent = '> ' + fmt(b.Q4) + meta.unit;
}

function formatValue(value, meta, compact = false) {
  if (value == null || Number.isNaN(+value)) return '–';
  if (meta.decimals === 0) return Math.round(+value).toLocaleString('fr-FR');
  return (+value).toFixed(compact ? Math.min(meta.decimals, 1) : meta.decimals);
}

function formatAxisTick(value, meta) {
  const base = formatValue(value, meta, true);
  if (base === '–') return base;
  return meta.unit === '%' ? base + '%' : base;
}

function updateScatterHeader() {
  const xMeta = LAYER_META[scatterXLayer];
  const yMeta = LAYER_META[scatterYLayer];
  document.querySelector('#chart-header h2').textContent =
    `${xMeta.shortLabel} × ${yMeta.shortLabel}`;
}

function isMobileLayout() {
  return window.innerWidth <= 768;
}

function applyMobileLayerState() {
  const collapsed = isMobileLayout() && mobileLayersCollapsed;
  document.body.classList.toggle('mobile-layers-collapsed', collapsed);

  const toggle = document.getElementById('mobile-layer-toggle');
  if (toggle) {
    toggle.textContent = collapsed ? 'Afficher les couches' : 'Masquer les couches';
  }
}

function applyMobileChartState() {
  const collapsed = isMobileLayout() && mobileChartCollapsed;
  document.body.classList.toggle('mobile-chart-collapsed', collapsed);

  const toggle = document.getElementById('mobile-chart-toggle');
  if (toggle) {
    toggle.textContent = collapsed ? 'Ouvrir le graphique' : 'Réduire le graphique';
  }

  if (!collapsed && geojsonData) {
    initScatter(geojsonData);
  }
}

function syncMobileLayout(forceCollapsed = null) {
  if (isMobileLayout()) {
    if (forceCollapsed !== null) {
      mobileChartCollapsed = forceCollapsed;
    } else if (!document.body.classList.contains('mobile-chart-collapsed') && !mobileChartCollapsed) {
      mobileChartCollapsed = true;
    }
    if (!document.body.classList.contains('mobile-layers-collapsed') && !mobileLayersCollapsed) {
      mobileLayersCollapsed = true;
    }
  } else {
    mobileChartCollapsed = false;
    mobileLayersCollapsed = false;
  }
  applyMobileLayerState();
  applyMobileChartState();
}

function populateAxisSelectors() {
  const xSelect = document.getElementById('x-axis-select');
  const ySelect = document.getElementById('y-axis-select');
  const layers = Object.keys(LAYER_META);

  [xSelect, ySelect].forEach(select => {
    select.innerHTML = '';
    layers.forEach(layer => {
      const opt = document.createElement('option');
      opt.value = layer;
      opt.textContent = LAYER_META[layer].shortLabel;
      select.appendChild(opt);
    });
  });

  xSelect.value = scatterXLayer;
  ySelect.value = scatterYLayer;

  xSelect.addEventListener('change', e => {
    scatterXLayer = e.target.value;
    updateScatterHeader();
    if (geojsonData) initScatter(geojsonData);
  });

  ySelect.addEventListener('change', e => {
    scatterYLayer = e.target.value;
    updateScatterHeader();
    if (geojsonData) initScatter(geojsonData);
  });
}

function switchLayer(layer) {
  currentLayer = layer;

  // Update button states
  document.querySelectorAll('.layer-btn').forEach(btn => {
    btn.classList.toggle('active', btn.dataset.layer === layer);
  });

  // Update map paint
  if (map.getLayer('bv-fill')) {
    map.setPaintProperty('bv-fill', 'fill-color', buildColorExpr(layer));
  }

  updateLegend(layer);
}

map.on('load', () => {
  fetch(GEOJSON_PATH)
    .then(r => {
      if (!r.ok) throw new Error(`HTTP ${r.status} — fichier GeoJSON introuvable`);
      return r.json();
    })
    .then(data => {
      geojsonData = data;

      // Add source with feature IDs for hover state
      const featuresWithId = {
        ...data,
        features: data.features.map((f, i) => ({ ...f, id: i }))
      };

      map.addSource('bureaux-vote', {
        type: 'geojson',
        data: featuresWithId,
        generateId: false
      });

      // Fill layer
      map.addLayer({
        id: 'bv-fill',
        type: 'fill',
        source: 'bureaux-vote',
        paint: {
          'fill-color': buildColorExpr('abstention'),
          'fill-opacity': [
            'case',
            ['boolean', ['feature-state', 'hover'], false], 1.0,
            0.78
          ]
        }
      });

      // Outline layer
      map.addLayer({
        id: 'bv-outline',
        type: 'line',
        source: 'bureaux-vote',
        paint: {
          'line-color': [
            'case',
            ['boolean', ['feature-state', 'hover'], false], '#ffffff',
            'rgba(255,255,255,0.15)'
          ],
          'line-width': [
            'case',
            ['boolean', ['feature-state', 'hover'], false], 2,
            0.5
          ]
        }
      });

      updateLegend('abstention');
      initScatter(featuresWithId);
    })
    .catch(err => {
      console.error(err);
      alert('Impossible de charger le GeoJSON.\n' + err.message +
        '\n\nVérifiez que process.py a bien été lancé et que le fichier existe dans data/processed/');
    });
});

// ── Tooltip ──────────────────────────────────────────────
const tooltip = document.getElementById('tooltip');

map.on('mousemove', 'bv-fill', e => {
  map.getCanvas().style.cursor = 'crosshair';
  const props = e.features[0].properties;
  const id    = e.features[0].id;

  // Hover state
  if (hoveredBvId !== null && hoveredBvId !== id) {
    map.setFeatureState({ source: 'bureaux-vote', id: hoveredBvId }, { hover: false });
  }
  hoveredBvId = id;
  map.setFeatureState({ source: 'bureaux-vote', id: id }, { hover: true });

  // Build tooltip HTML
  const fmt = (v, d=1) => (v == null || v === 'null') ? '–'
    : (d === 0 ? Math.round(+v).toLocaleString('fr-FR') : (+v).toFixed(d));

  tooltip.innerHTML = `
    <strong>BV ${props.code_bv}${props.arrondissement ? ' — ' + props.arrondissement : ''}</strong><br>
    Inscrits&nbsp;: ${fmt(props.inscrits, 0)}<br>
    Abstention&nbsp;: <b>${fmt(props.taux_abstention)}%</b><br>
    Revenu médian&nbsp;: ${fmt(props.revenu_median, 0)} €/UC<br>
    Logements HLM&nbsp;: ${fmt(props.n_hlm, 0)} (${fmt(props.hlm_density, 0)}/km²)
    <div class="tip-warn">
      ⚠ L'abstention est calculée sur les inscrits uniquement.
      Dans les quartiers HLM, le taux réel de non-participation
      est probablement sous-estimé (Braconnier &amp; Dormagen, 2007).
    </div>
  `;

  // Position tooltip
  const rect = map.getCanvas().getBoundingClientRect();
  let tx = e.originalEvent.clientX - rect.left + 14;
  let ty = e.originalEvent.clientY - rect.top  - 20;
  if (tx + 270 > rect.width)  tx = e.originalEvent.clientX - rect.left - 274;
  if (ty + 160 > rect.height) ty = e.originalEvent.clientY - rect.top  - 160;
  tooltip.style.left    = tx + 'px';
  tooltip.style.top     = ty + 'px';
  tooltip.style.display = 'block';

  // Sync scatter
  highlightScatterPoint(props.code_bv);
});

map.on('mouseleave', 'bv-fill', () => {
  map.getCanvas().style.cursor = '';
  tooltip.style.display = 'none';
  if (hoveredBvId !== null) {
    map.setFeatureState({ source: 'bureaux-vote', id: hoveredBvId }, { hover: false });
    hoveredBvId = null;
  }
  resetScatterHighlight();
});

// ── Layer buttons ─────────────────────────────────────────
document.querySelectorAll('.layer-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    switchLayer(btn.dataset.layer);
    if (isMobileLayout()) {
      mobileLayersCollapsed = true;
      applyMobileLayerState();
    }
  });
});

// ═══════════════════════════════════════════════════════════
// SCATTER PLOT (D3)
// ═══════════════════════════════════════════════════════════
function initScatter(data) {
  if (isMobileLayout() && mobileChartCollapsed) return;

  const container = document.getElementById('scatter-container');
  const W = container.clientWidth;
  const H = container.clientHeight;
  const xMeta = LAYER_META[scatterXLayer];
  const yMeta = LAYER_META[scatterYLayer];

  const margin = { top: 20, right: 20, bottom: 50, left: 52 };
  const width  = W - margin.left - margin.right;
  const height = H - margin.top  - margin.bottom;

  const features = data.features.filter(f =>
    f.properties[xMeta.field] != null && !isNaN(+f.properties[xMeta.field]) &&
    f.properties[yMeta.field] != null && !isNaN(+f.properties[yMeta.field])
  );

  if (features.length === 0) return;

  // Scales
  const xMax = d3.max(features, f => +f.properties[xMeta.field]) * 1.05;
  const yMax = d3.max(features, f => +f.properties[yMeta.field]) * 1.05;

  const xScale = d3.scaleLinear().domain([0, xMax]).range([0, width]);
  const yScale = d3.scaleLinear().domain([0, yMax]).range([height, 0]);

  // Color by arrondissement
  const arrondissements = [...new Set(features.map(f => f.properties.arrondissement))].sort();
  const colorScale = d3.scaleOrdinal(d3.schemeTableau10).domain(arrondissements);

  // SVG
  const svgEl = d3.select('#scatter');
  svgEl.attr('width', W).attr('height', H);
  svgEl.selectAll('*').remove();

  const g = svgEl.append('g').attr('transform', `translate(${margin.left},${margin.top})`);

  // Grid
  g.append('g').attr('class', 'grid')
    .call(d3.axisLeft(yScale).ticks(5).tickSize(-width).tickFormat(''))
    .call(ax => ax.select('.domain').remove())
    .call(ax => ax.selectAll('line').attr('stroke', '#0f3460').attr('stroke-dasharray', '3,3'));

  g.append('g').attr('class', 'grid')
    .attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(5).tickSize(-height).tickFormat(''))
    .call(ax => ax.select('.domain').remove())
    .call(ax => ax.selectAll('line').attr('stroke', '#0f3460').attr('stroke-dasharray', '3,3'));

  // Axes
  g.append('g').attr('transform', `translate(0,${height})`)
    .call(d3.axisBottom(xScale).ticks(5).tickFormat(d => formatAxisTick(d, xMeta)))
    .call(ax => ax.select('.domain').attr('stroke', '#0f3460'))
    .call(ax => ax.selectAll('text').attr('fill', '#8892b0').attr('font-size', 10))
    .call(ax => ax.selectAll('line').attr('stroke', '#0f3460'));

  g.append('g')
    .call(d3.axisLeft(yScale).ticks(5).tickFormat(d => formatAxisTick(d, yMeta)))
    .call(ax => ax.select('.domain').attr('stroke', '#0f3460'))
    .call(ax => ax.selectAll('text').attr('fill', '#8892b0').attr('font-size', 10))
    .call(ax => ax.selectAll('line').attr('stroke', '#0f3460'));

  // Axis labels
  g.append('text')
    .attr('x', width / 2).attr('y', height + 40)
    .attr('text-anchor', 'middle').attr('fill', '#8892b0').attr('font-size', 11)
    .text(xMeta.label);

  g.append('text')
    .attr('transform', 'rotate(-90)')
    .attr('x', -height / 2).attr('y', -42)
    .attr('text-anchor', 'middle').attr('fill', '#8892b0').attr('font-size', 11)
    .text(yMeta.label);

  // OLS regression
  const pts = features.map(f => ({
    x: +f.properties[xMeta.field],
    y: +f.properties[yMeta.field]
  }));
  const r2 = pearsonR(pts) ** 2;
  const r  = pearsonR(pts);

  if (r2 >= 0.1) {
    const reg = ols(pts);
    const x1 = 0, x2 = xMax;
    const y1 = reg.a + reg.b * x1;
    const y2 = reg.a + reg.b * x2;

    g.append('line')
      .attr('x1', xScale(x1)).attr('y1', yScale(y1))
      .attr('x2', xScale(x2)).attr('y2', yScale(y2))
      .attr('stroke', '#f03b20').attr('stroke-width', 1.5)
      .attr('stroke-dasharray', '6,3').attr('opacity', 0.8);
  }

  // Data points
  scatterCircles = g.selectAll('circle')
    .data(features)
    .join('circle')
    .attr('cx', f => xScale(+f.properties[xMeta.field]))
    .attr('cy', f => yScale(+f.properties[yMeta.field]))
    .attr('r', 3.5)
    .attr('fill', f => colorScale(f.properties.arrondissement))
    .attr('opacity', 0.65)
    .attr('stroke', 'none')
    .style('cursor', 'crosshair');

  // Scatter hover → map highlight
  scatterCircles
    .on('mouseover', (event, f) => {
      const code = f.properties.code_bv;
      highlightScatterPoint(code);

      // Fly to BV on map
      if (f.geometry && f.geometry.coordinates) {
        // For polygon, use first coordinate ring centroid approximation
        try {
          const coords = f.geometry.type === 'Polygon'
            ? f.geometry.coordinates[0]
            : f.geometry.coordinates[0][0];
          const lngs = coords.map(c => c[0]);
          const lats = coords.map(c => c[1]);
          const cx = (Math.min(...lngs) + Math.max(...lngs)) / 2;
          const cy = (Math.min(...lats) + Math.max(...lats)) / 2;
          map.easeTo({ center: [cx, cy], duration: 300 });
        } catch {}
      }
    })
    .on('mouseout', () => resetScatterHighlight());

  // Stats
  document.getElementById('stat-r2').textContent = r2.toFixed(3);
  document.getElementById('stat-r').textContent  = r.toFixed(3);
  document.getElementById('stat-n').textContent  = features.length;
}

function highlightScatterPoint(codeBv) {
  if (!scatterCircles) return;
  scatterCircles
    .attr('r', f => f.properties.code_bv === codeBv ? 7 : 3)
    .attr('opacity', f => f.properties.code_bv === codeBv ? 1 : 0.2)
    .attr('stroke', f => f.properties.code_bv === codeBv ? '#ffffff' : 'none')
    .attr('stroke-width', 1.5);
}

function resetScatterHighlight() {
  if (!scatterCircles) return;
  scatterCircles
    .attr('r', 3.5)
    .attr('opacity', 0.65)
    .attr('stroke', 'none');
}

// ═══════════════════════════════════════════════════════════
// STATS HELPERS
// ═══════════════════════════════════════════════════════════
function ols(pts) {
  const n    = pts.length;
  const sumX = d3.sum(pts, p => p.x);
  const sumY = d3.sum(pts, p => p.y);
  const sumXY= d3.sum(pts, p => p.x * p.y);
  const sumX2= d3.sum(pts, p => p.x * p.x);
  const b    = (n * sumXY - sumX * sumY) / (n * sumX2 - sumX * sumX);
  const a    = (sumY - b * sumX) / n;
  return { a, b };
}

function pearsonR(pts) {
  const n    = pts.length;
  const meanX = d3.mean(pts, p => p.x);
  const meanY = d3.mean(pts, p => p.y);
  const num  = d3.sum(pts, p => (p.x - meanX) * (p.y - meanY));
  const den  = Math.sqrt(
    d3.sum(pts, p => (p.x - meanX) ** 2) *
    d3.sum(pts, p => (p.y - meanY) ** 2)
  );
  return den === 0 ? 0 : num / den;
}

// Redraw scatter on window resize
window.addEventListener('resize', () => {
  syncMobileLayout();
  if (geojsonData) {
    initScatter(geojsonData);
  }
});
</script>
